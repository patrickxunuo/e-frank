<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 152 32"
     role="img" aria-labelledby="title desc">
  <title id="title">paperplane</title>
  <desc id="desc">paperplane horizontal lockup — paper airplane glyph with lowercase wordmark in white. For dark UI.</desc>

  <!--
    Horizontal lockup: glyph (32×32, left) + lowercase wordmark
    (right). Same SVG scales from sidebar size (~24-32px tall) up
    to brand size (~48-64px tall). Wordmark is white — pair with
    on-dark surfaces. Sibling on-light variant only differs in the
    wordmark fill.
  -->
  <defs>
    <style>
      .body { fill: #5b8dff; }
      .shadow { fill: #2c4a99; }
      .wordmark {
        fill: #ffffff;
        fill-opacity: 0.92;
        font-family: 'Inter', 'SF Pro Display', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
    </style>
  </defs>

  <!-- Glyph (anchored at left edge of viewBox).
       See paperplane-icon.svg for the silhouette construction. -->
  <polygon class="shadow" points="30,8 14,19 12,27 24,14"/>
  <polygon class="body"   points="30,8 3,13 14,19"/>

  <!-- Wordmark.
       x=42 leaves a 14px gap between glyph and text — feels balanced
       across sidebar sizes and brand sizes. dominant-baseline="middle"
       centers visually against the 32px-tall glyph without baseline math. -->
  <text class="wordmark" x="42" y="16" dominant-baseline="middle">paperplane</text>
</svg>
