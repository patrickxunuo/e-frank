<!-- Concept 1 — horizontal lockup. Icon + lowercase wordmark "e-frank".
     Wordmark uses Inter (system fallback) at the same weight the app's
     `--font-display` ships. The hyphen is a slim rounded rect rather
     than a baseline glyph so it reads as a connector, not punctuation. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" role="img" aria-labelledby="t d">
  <title id="t">e-frank</title>
  <desc id="d">e-frank logo: stacked rounded squares with a forward arrow, alongside the wordmark.</desc>

  <!-- Icon -->
  <g transform="translate(0, 0)">
    <rect x="12" y="12" width="50" height="50" rx="10"
          fill="none" stroke="#4d7cff" stroke-width="3"
          stroke-dasharray="5 4" opacity="0.75"/>
    <rect x="38" y="38" width="50" height="50" rx="10" fill="#4d7cff"/>
    <path d="M 51 63 L 75 63 M 67 55 L 75 63 L 67 71"
          stroke="#ffffff" stroke-width="3.5"
          stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Wordmark -->
  <text x="118" y="62"
        font-family="Inter, -apple-system, 'Segoe UI', sans-serif"
        font-size="42" font-weight="600" fill="#e7eaf3"
        letter-spacing="-0.02em">e</text>

  <!-- Stylized hyphen (small rounded rect, accent color) -->
  <rect x="148" y="48" width="14" height="4" rx="2" fill="#4d7cff"/>

  <text x="166" y="62"
        font-family="Inter, -apple-system, 'Segoe UI', sans-serif"
        font-size="42" font-weight="600" fill="#e7eaf3"
        letter-spacing="-0.02em">frank</text>
</svg>
