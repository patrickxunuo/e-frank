<!-- Concept 1: Stacked Transformation
     Two rounded squares — the back one dashed (the ticket, still pending),
     the front one filled with a forward arrow (the shipped PR). Tells the
     ticket-to-PR story in one glance. Builds on the existing IconLogo's
     stacked-square mark. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-labelledby="t1 d1">
  <title id="t1">e-frank logo</title>
  <desc id="d1">Two stacked rounded squares — back dashed, front filled with a forward arrow.</desc>

  <!-- Back square: the ticket (WIP) -->
  <rect x="12" y="12" width="50" height="50" rx="10"
        fill="none" stroke="#4d7cff" stroke-width="3"
        stroke-dasharray="5 4" opacity="0.75"/>

  <!-- Front square: the PR (shipped) -->
  <rect x="38" y="38" width="50" height="50" rx="10" fill="#4d7cff"/>

  <!-- Forward arrow inside the front square -->
  <path d="M 51 63 L 75 63 M 67 55 L 75 63 L 67 71"
        stroke="#ffffff" stroke-width="3.5"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
