<!-- Concept 2: Aperture / Focus
     Six chevron blades arranged around a center, evoking a camera iris
     or the agent's narrowing focus on a single task. Reads as a flower
     of arrows pointing inward — convergence, attention, "ship one
     ticket through to done." Strong silhouette, recognizable at 16×16. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-labelledby="t2 d2">
  <title id="t2">e-frank logo</title>
  <desc id="d2">A six-blade aperture with a central core, evoking focus and convergence.</desc>

  <defs>
    <linearGradient id="ap-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6b91ff"/>
      <stop offset="100%" stop-color="#3a64da"/>
    </linearGradient>
  </defs>

  <!-- Outer rounded badge -->
  <rect x="4" y="4" width="92" height="92" rx="22" fill="url(#ap-grad)"/>

  <!-- Aperture blades — 6 chevrons rotated around center (50,50) -->
  <g fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
    <path d="M 50 22 L 50 40" transform="rotate(0 50 50)"/>
    <path d="M 50 22 L 50 40" transform="rotate(60 50 50)"/>
    <path d="M 50 22 L 50 40" transform="rotate(120 50 50)"/>
    <path d="M 50 22 L 50 40" transform="rotate(180 50 50)"/>
    <path d="M 50 22 L 50 40" transform="rotate(240 50 50)"/>
    <path d="M 50 22 L 50 40" transform="rotate(300 50 50)"/>
  </g>

  <!-- Center core -->
  <circle cx="50" cy="50" r="9" fill="#ffffff"/>
</svg>
