<!-- Concept 3: Forward Chevron Block
     A rounded square with a clean double-chevron forward arrow embedded
     in negative space. The double-chevron reads as "fast-forward" / ship
     it / progress. Strongest typographic pairing — the simplest mark,
     scales beautifully to favicon, recognizable in monochrome. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-labelledby="t3 d3">
  <title id="t3">e-frank logo</title>
  <desc id="d3">A rounded square with a forward double-chevron in negative space.</desc>

  <!-- Filled rounded square -->
  <rect x="6" y="6" width="88" height="88" rx="20" fill="#4d7cff"/>

  <!-- Double chevron (negative space — drawn in white over the blue) -->
  <path d="M 30 32 L 50 50 L 30 68"
        fill="none" stroke="#ffffff" stroke-width="9"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 50 32 L 70 50 L 50 68"
        fill="none" stroke="#ffffff" stroke-width="9"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
