appId: tech.emonster.paperplane
productName: PaperPlane
directories:
  output: release/${version}
  buildResources: build
files:
  - out/**/*
  - package.json
asar: true
win:
  target:
    - target: nsis
      arch:
        - x64
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.developer-tools
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
